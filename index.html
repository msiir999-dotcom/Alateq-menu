<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COFFEE ALCAPTAIN | منيو الكابتن</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0b0b;
            --card-bg: rgba(28, 28, 30, 0.45); /* زيادة الشفافية للأصناف لتظهر الخلفية */
            --primary-orange: #ff5100;
            --primary-yellow: #ffcc00;
            --text-beige: #f5f5f7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-beige);
            overflow-x: hidden;
            padding-bottom: 100px;
            position: relative;
        }

        /* طبقة الأراغيل الطبيعية الشفافة في الخلفية */
        .shisha-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            opacity: 0.15; /* زيادة البروز قليلاً لتبدو طبيعية وعميقة خلف الشفافية */
            z-index: -2;
            pointer-events: none;
        }

        /* كانفاس حركة تصاعد الدخان الحقيقي */
        #smoke-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            opacity: 0.5;
        }

        header {
            text-align: center;
            padding: 50px 20px 30px 20px;
            position: relative;
        }

        /* تعديل الاسم وتكبيره وتوهجه بعد إلغاء العنوان القديم */
        .brand-subtitle {
            font-size: 38px;
            color: var(--primary-orange);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 
                0 0 12px rgba(255, 81, 0, 0.7),
                0 0 25px rgba(255, 81, 0, 0.4),
                2px 2px 5px rgba(0, 0, 0, 0.9);
        }

        /* بار الأقسام الشفاف بالكامل */
        .categories-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            position: sticky;
            top: 0;
            background: rgba(11, 11, 11, 0.45); /* جعل بار الأقسام شفافاً مدمجاً مع الدخان */
            backdrop-filter: blur(15px); /* زيادة تأثير الضباب وجمالية التصفح */
            -webkit-backdrop-filter: blur(15px);
            z-index: 10;
            border-bottom: 1px solid rgba(255, 81, 0, 0.15);
            overflow-x: auto;
        }

        .cat-btn {
            background: rgba(28, 28, 30, 0.6);
            color: var(--text-beige);
            border: 1px solid rgba(255, 204, 0, 0.25);
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .cat-btn.active, .cat-btn:hover {
            background: linear-gradient(135deg, var(--primary-orange), var(--primary-yellow));
            color: #000;
            border-color: transparent;
            box-shadow: 0 0 15px rgba(255, 81, 0, 0.5);
        }

        /* حاوية المنتجات */
        .menu-container {
            max-width: 600px;
            margin: 25px auto;
            padding: 0 15px;
        }

        /* كارت الوجبة وتأثير الشفافية الفخم (Glassmorphism) */
        .item-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            backdrop-filter: blur(12px); /* ضبابي شفاف تظهر حركة الدخان من خلفه */
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .item-info {
            flex: 1;
            padding-left: 15px;
        }

        .item-names {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 6px;
        }

        .en-name {
            font-size: 20px;
            font-weight: 900;
            color: var(--primary-yellow);
            text-transform: uppercase;
            text-shadow: 0 0 4px rgba(255, 204, 0, 0.2);
        }

        .ar-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-beige);
        }

        .item-price {
            font-size: 19px;
            color: var(--primary-orange);
            font-weight: 700;
            text-shadow: 0 0 4px rgba(255, 81, 0, 0.2);
        }

        /* أزرار الكابتن */
        .captain-actions {
            display: none;
            gap: 8px;
        }

        .btn-edit {
            background: #007aff;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
        }

        .btn-delete {
            background: #ff3b30;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
        }

        /* لوحة التحكم الإدارية المحدثة */
        .captain-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #1c1c1e;
            border-top: 2px solid var(--primary-orange);
            padding: 15px;
            z-index: 100;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.8);
            display: none;
        }

        .captain-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 8px;
            margin-bottom: 10px;
        }

        .form-grid input, .form-grid select {
            background: #2c2c2e;
            border: 1px solid #48484a;
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
        }

        .btn-add-item {
            background: linear-gradient(135deg, var(--primary-orange), var(--primary-yellow));
            color: black;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
        }

        .toggle-captain-btn {
            position: fixed;
            bottom: 15px;
            left: 15px;
            background: rgba(44, 44, 46, 0.85);
            border: 1px solid rgba(255,255,255,0.1);
            color: #8e8e93;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            z-index: 101;
            backdrop-filter: blur(5px);
        }

        .toggle-captain-btn.active {
            background: var(--primary-orange);
            color: white;
            border-color: transparent;
            box-shadow: 0 0 10px var(--primary-orange);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="shisha-background"></div>

    <canvas id="smoke-canvas"></canvas>

    <header>
        <div class="brand-subtitle">COFFEE ALCAPTAIN</div>
    </header>

    <div class="categories-container">
        <button class="cat-btn active" onclick="switchCategory('shisha')">💨 الأراغيل</button>
        <button class="cat-btn" onclick="switchCategory('cold')">🍹 المشروبات الباردة</button>
        <button class="cat-btn" onclick="switchCategory('hot')">☕ المشروبات الساخنة</button>
    </div>

    <div class="menu-container" id="menu-items-wrapper"></div>

    <button class="toggle-captain-btn" onclick="toggleCaptainMode()">⚙️ وضع الكابتن</button>

    <div class="captain-panel" id="captainPanel">
        <div class="captain-panel-header">
            <h3 style="color: var(--primary-yellow);">لوحة التحكم والتعديل السريع</h3>
            <span style="font-size: 12px; color: #aaa;">إدارة الكافيه</span>
        </div>
        <div class="form-grid">
            <input type="text" id="prodEnName" placeholder="الاسم بالإنكليزي (مثال: DOUBLE APPLE)">
            <input type="text" id="prodArName" placeholder="الاسم بالعربي (مثال: تفاحتين نخلة)">
            <input type="number" id="prodPrice" placeholder="السعر (مثال: 5000)">
            <select id="prodCat">
                <option value="shisha">الأراغيل</option>
                <option value="cold">المشروبات الباردة</option>
                <option value="hot">المشروبات الساخنة</option>
            </select>
        </div>
        <button class="btn-add-item" onclick="addNewItem()">➕ إضافة / تحديث المنتج</button>
    </div>

    <script>
        // البيانات الافتراضية
        let defaultMenu = [
            { id: 1, en: "Double Apple", ar: "تفاحتين نخلة", price: "7,000", cat: "shisha" },
            { id: 2, en: "Gum & Mint", ar: "علكة ونعناع", price: "6,000", cat: "shisha" },
            { id: 3, en: "Lemon Mint", ar: "ليمون ونعناع عصير", price: "4,500", cat: "cold" },
            { id: 4, en: "Iced Latte", ar: "آيس لاتيه", price: "5,000", cat: "cold" },
            { id: 5, en: "Turkish Coffee", ar: "قهوة تركية", price: "3,000", cat: "hot" },
            { id: 6, en: "Mix Tea", ar: "شاي مخدر هيل", price: "1,500", cat: "hot" }
        ];

        let menuData = JSON.parse(localStorage.getItem('dynamic_menu_data')) || defaultMenu;
        let currentCategory = 'shisha';
        let isCaptainMode = false;
        let editTargetId = null;

        function renderMenu() {
            const wrapper = document.getElementById('menu-items-wrapper');
            wrapper.innerHTML = '';
            const filtered = menuData.filter(item => item.cat === currentCategory);

            if(filtered.length === 0) {
                wrapper.innerHTML = `<p style="text-align:center; padding:30px; color:#aaa;">لا توجد منتجات في هذا القسم حالياً.</p>`;
                return;
            }

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                    <div class="item-info">
                        <div class="item-names">
                            <span class="en-name">${item.en}</span>
                            <span class="ar-name">| ${item.ar}</span>
                        </div>
                        <div class="item-price">${item.price} د.ع</div>
                    </div>
                    <div class="captain-actions" style="display: ${isCaptainMode ? 'flex' : 'none'}">
                        <button class="btn-edit" onclick="prepEdit(${item.id})">تعديل</button>
                        <button class="btn-delete" onclick="deleteItem(${item.id})">حذف</button>
                    </div>
                `;
                wrapper.appendChild(card);
            });
        }

        function switchCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderMenu();
        }

        function toggleCaptainMode() {
            isCaptainMode = !isCaptainMode;
            const btn = document.querySelector('.toggle-captain-btn');
            const panel = document.getElementById('captainPanel');
            
            if(isCaptainMode) {
                btn.classList.add('active');
                panel.style.display = 'block';
            } else {
                btn.classList.remove('active');
                panel.style.display = 'none';
                editTargetId = null;
                clearForm();
            }
            renderMenu();
        }

        function addNewItem() {
            const en = document.getElementById('prodEnName').value.trim();
            const ar = document.getElementById('prodArName').value.trim();
            const priceNum = document.getElementById('prodPrice').value.trim();
            const cat = document.getElementById('prodCat').value;

            if(!en || !ar || !priceNum) {
                alert('الرجاء ملء كافة الحقول أولاً يا كابتن!');
                return;
            }

            const price = parseFloat(priceNum).toLocaleString('en-US');

            if(editTargetId) {
                menuData = menuData.map(item => item.id === editTargetId ? {id: editTargetId, en, ar, price, cat} : item);
                editTargetId = null;
            } else {
                const newId = menuData.length > 0 ? Math.max(...menuData.map(o => o.id)) + 1 : 1;
                menuData.push({ id: newId, en, ar, price, cat });
            }

            localStorage.setItem('dynamic_menu_data', JSON.stringify(menuData));
            clearForm();
            renderMenu();
        }

        function prepEdit(id) {
            const item = menuData.find(i => i.id === id);
            if(item) {
                document.getElementById('prodEnName').value = item.en;
                document.getElementById('prodArName').value = item.ar;
                document.getElementById('prodPrice').value = item.price.replace(/,/g, '');
                document.getElementById('prodCat').value = item.cat;
                editTargetId = id;
                document.getElementById('prodEnName').focus();
            }
        }

        function deleteItem(id) {
            if(confirm('هل أنت متأكد من حذف هذا المنتج نهائياً من المنيو؟')) {
                menuData = menuData.filter(item => item.id !== id);
                localStorage.setItem('dynamic_menu_data', JSON.stringify(menuData));
                renderMenu();
            }
        }

        function clearForm() {
            document.getElementById('prodEnName').value = '';
            document.getElementById('prodArName').value = '';
            document.getElementById('prodPrice').value = '';
        }

        // ==================== محرك تأثير الدخان الطبيعي المتطور ====================
        const canvas = document.getElementById('smoke-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const partyCount = 35;
        const particles = [];

        class SmokeParticle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 150;
                this.size = Math.random() * 120 + 60;
                this.speedY = -(Math.random() * 0.5 + 0.25);
                this.speedX = Math.random() * 0.4 - 0.2;
                this.opacity = Math.random() * 0.18 + 0.05;
                this.fadeRate = Math.random() * 0.0012 + 0.0006;
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                this.opacity -= this.fadeRate;
                if (this.opacity <= 0 || this.y < -this.size) {
                    this.reset();
                }
            }
            draw() {
                ctx.beginPath();
                let gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                gradient.addColorStop(0, `rgba(240, 240, 245, ${this.opacity})`);
                gradient.addColorStop(0.3, `rgba(255, 110, 20, ${this.opacity * 0.25})`);
                gradient.addColorStop(1, 'rgba(11, 11, 11, 0)');
                
                ctx.fillStyle = gradient;
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < partyCount; i++) {
            particles.push(new SmokeParticle());
        }

        function animateSmoke() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateSmoke);
        }
        animateSmoke();

        renderMenu();
    </script>
</body>
</html>
